name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pull dataset with DVC
        run: python -m dvc pull -f
      - name: Run tests
        run: pytest tests/ -v

  train:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pull dataset with DVC
        run: python -m dvc pull -f
      - name: Train model and verify thresholds
        run: python src/model_training.py --config configs/config.yaml
        env:
          MLFLOW_ALLOW_FILE_STORE: 'true'
